<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" fill="none">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#5b6cff" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="30%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#0d1017"/>
      <stop offset="100%" stop-color="#090b10"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#glow)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- turret schematic -->
  <g stroke="#8fa6f0" stroke-opacity="0.55" stroke-width="2" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="360" cy="410" rx="150" ry="52"/>
    <path d="M210 410 v46 a150 52 0 0 0 300 0 v-46"/>
    <circle cx="360" cy="368" r="46"/>
    <!-- gear ticks -->
    <path d="M360 322 v-14 M360 414 v14 M314 368 h-14 M406 368 h14
             M327 335 l-10 -10 M393 335 l10 -10 M327 401 l-10 10 M393 401 l10 10"/>
    <!-- barrel -->
    <line x1="392" y1="345" x2="690" y2="215"/>
    <line x1="378" y1="322" x2="676" y2="192"/>
    <line x1="676" y1="192" x2="690" y2="215"/>
    <!-- trajectory -->
    <path d="M690 205 C 740 150, 770 120, 795 96" stroke-opacity="0.3"/>
    <!-- reticle -->
    <circle cx="795" cy="96" r="30"/>
    <path d="M795 60 v18 M795 114 v18 M759 96 h18 M813 96 h18"/>
  </g>

  <!-- labels -->
  <text x="560" y="452" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="72" font-weight="700" fill="#e8e6e1" letter-spacing="-1">OMEGABOT</text>
  <text x="562" y="490" font-family="Georgia, serif" font-style="italic"
        font-size="26" fill="#ffb454" fill-opacity="0.85">vision-locked shooter · aim-solve rig</text>

  <!-- telemetry readout -->
  <text x="1160" y="56" text-anchor="end"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" fill="#6f7382">
    p(hit) @ 4 m <tspan fill="#7ee0a8" font-weight="600">0.68</tspan>
  </text>
  <text x="1160" y="84" text-anchor="end"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" fill="#6f7382">
    azimuth <tspan fill="#7ee0a8" font-weight="600">34.6°/360</tspan>
  </text>
</svg>
